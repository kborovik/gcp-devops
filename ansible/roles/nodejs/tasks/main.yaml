---
- name: Add NodeSource apt signing key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: '0644'

- name: Add NodeSource apt repository (Node {{ nodejs_major_version }}.x)
  ansible.builtin.apt_repository:
    repo: 'deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ nodejs_major_version }}.x nodistro main'
    filename: nodesource
    state: present
    update_cache: true

- name: Install Node.js (includes npm)  # noqa: package-latest
  ansible.builtin.apt:
    name: nodejs
    state: latest

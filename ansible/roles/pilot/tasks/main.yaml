---
- name: Assert pilot_version is set
  ansible.builtin.assert:
    that:
      - pilot_version | length > 0
    fail_msg: "pilot_version must be set (e.g. --extra-vars 'pilot_version=1.2.3')"

- name: Check if pilot service exists
  ansible.builtin.command:
    cmd: systemctl list-unit-files pilot.service
  register: pilot_service_exists
  changed_when: false
  failed_when: false

- name: Stop pilot service
  ansible.builtin.systemd:
    name: pilot
    state: stopped
  when: "'pilot.service' in pilot_service_exists.stdout"

- name: Kill orphaned pilot processes
  ansible.builtin.shell:
    cmd: pkill -f '[p]ilot server start' || true
    executable: /bin/bash
  changed_when: false

- name: Fetch GCP project ID from metadata server
  ansible.builtin.uri:
    url: http://metadata.google.internal/computeMetadata/v1/project/project-id
    headers:
      Metadata-Flavor: Google
    return_content: true
  register: gcp_metadata

- name: Set GCP project ID fact
  ansible.builtin.set_fact:
    gcp_project_id: '{{ gcp_metadata.content }}'

- name: Install uv
  ansible.builtin.shell:
    cmd: curl -LsSf https://astral.sh/uv/install.sh | sh
    creates: /home/ubuntu/.local/bin/uv
  become_user: '{{ pilot_user }}'

- name: Install Python {{ pilot_python_version }} via uv
  ansible.builtin.command:
    cmd: /home/ubuntu/.local/bin/uv python install {{ pilot_python_version }}
  become_user: '{{ pilot_user }}'
  register: uv_python_install
  changed_when: "'Installed' in uv_python_install.stderr"

- name: Create directory structure
  ansible.builtin.file:
    path: '{{ item.path }}'
    owner: '{{ item.owner | default(pilot_user) }}'
    group: '{{ item.group | default(pilot_group) }}'
    mode: "{{ item.mode | default('0755') }}"
    state: directory
  loop:
    - { path: '{{ pilot_base_dir }}' }
    - { path: '{{ pilot_releases_dir }}' }
    - { path: '{{ pilot_state_dir }}' }

- name: Check if release already installed
  ansible.builtin.stat:
    path: '{{ pilot_releases_dir }}/{{ pilot_version }}/bin/pilot'
  register: pilot_release_check

- name: Install release
  when: not pilot_release_check.stat.exists
  block:
    - name: Create release directory
      ansible.builtin.file:
        path: '{{ pilot_releases_dir }}/{{ pilot_version }}'
        owner: '{{ pilot_user }}'
        group: '{{ pilot_group }}'
        mode: '0755'
        state: directory

    - name: Get release asset URL from GitHub API
      ansible.builtin.uri:
        url: 'https://api.github.com/repos/{{ pilot_github_repo }}/releases/tags/v{{ pilot_version }}'
        headers:
          Authorization: 'Bearer {{ pilot_github_token }}'
        return_content: true
      register: pilot_release_info

    - name: Download wheel from GitHub releases
      ansible.builtin.get_url:
        url: "{{ (pilot_release_info.json.assets | selectattr('name', 'equalto', pilot_wheel_name) | first).url }}"
        dest: '/tmp/{{ pilot_wheel_name }}'
        headers:
          Authorization: 'Bearer {{ pilot_github_token }}'
          Accept: 'application/octet-stream'
        mode: '0644'

    - name: Create venv and install wheel with uv
      ansible.builtin.shell:
        cmd: |
          set -eo pipefail
          /home/ubuntu/.local/bin/uv venv --python {{ pilot_python_version }} {{ pilot_releases_dir }}/{{ pilot_version }}
          /home/ubuntu/.local/bin/uv pip install --python {{ pilot_releases_dir }}/{{ pilot_version }}/bin/python /tmp/{{ pilot_wheel_name }}
      args:
        executable: /bin/bash
      become_user: '{{ pilot_user }}'
      register: pilot_install
      changed_when: pilot_install.rc == 0

    - name: Clean up wheel file
      ansible.builtin.file:
        path: '/tmp/{{ pilot_wheel_name }}'
        state: absent

    - name: Set release directory ownership
      ansible.builtin.file:
        path: '{{ pilot_releases_dir }}/{{ pilot_version }}'
        owner: '{{ pilot_user }}'
        group: '{{ pilot_group }}'
        recurse: true

- name: Update current symlink
  ansible.builtin.file:
    src: '{{ pilot_releases_dir }}/{{ pilot_version }}'
    dest: '{{ pilot_current_link }}'
    owner: '{{ pilot_user }}'
    group: '{{ pilot_group }}'
    state: link
  notify: Restart pilot

- name: Add pilot to system PATH
  ansible.builtin.file:
    src: '{{ pilot_current_link }}/bin/pilot'
    dest: /usr/local/bin/pilot
    state: link
    force: true

- name: Configure pilot settings
  ansible.builtin.command:
    cmd: >-
      {{ pilot_current_link }}/bin/pilot setup set
      --input.key={{ item.key }}
      --input.value={{ item.value }}
  become_user: '{{ pilot_user }}'
  loop:
    - { key: database_url, value: '{{ pilot_database_url }}' }
    - { key: google_project_id, value: '{{ gcp_project_id }}' }
    - { key: anthropic_api_key, value: '{{ pilot_anthropic_api_key }}' }
    - { key: test_inbound_email, value: '{{ pilot_test_inbound_email }}' }
    - { key: test_outbound_email, value: '{{ pilot_test_outbound_email }}' }
  loop_control:
    label: '{{ item.key }}'
  changed_when: true
  notify: Restart pilot

- name: Ensure PostgreSQL cluster is started
  ansible.builtin.command:
    cmd: pg_ctlcluster 18 main start
  register: pg_start
  changed_when: pg_start.rc == 0 and 'already running' not in (pg_start.stderr | default(''))
  failed_when: pg_start.rc != 0 and 'already running' not in (pg_start.stderr | default(''))

- name: Check if ubuntu PostgreSQL role exists
  ansible.builtin.command:
    cmd: psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='ubuntu'" postgres
  become_user: postgres
  register: ubuntu_pg_role_check
  changed_when: false

- name: Create ubuntu PostgreSQL role if missing
  ansible.builtin.command:
    cmd: psql -c "CREATE ROLE ubuntu WITH LOGIN CREATEDB"
  become_user: postgres
  when: ubuntu_pg_role_check.stdout != '1'

- name: Check if pilot database exists
  ansible.builtin.command:
    cmd: psql -tAc "SELECT 1 FROM pg_database WHERE datname='pilot'" postgres
  become_user: postgres
  register: pilot_pg_db_check
  changed_when: false

- name: Create pilot database if missing
  ansible.builtin.command:
    cmd: createdb -O ubuntu pilot
  become_user: postgres
  when: pilot_pg_db_check.stdout != '1'

- name: Check public schema owner in pilot database
  ansible.builtin.command:
    cmd: psql -tAc "SELECT nspowner::regrole FROM pg_namespace WHERE nspname='public'" pilot
  become_user: postgres
  register: public_schema_owner
  changed_when: false

- name: Grant ubuntu ownership of public schema in pilot database
  ansible.builtin.command:
    cmd: psql -d pilot -c "ALTER SCHEMA public OWNER TO ubuntu"
  become_user: postgres
  when: public_schema_owner.stdout != 'ubuntu'

- name: Initialize database schema
  ansible.builtin.command:
    cmd: '{{ pilot_current_link }}/bin/pilot setup init'
  become_user: '{{ pilot_user }}'
  register: pilot_setup_init
  changed_when: "'already' not in pilot_setup_init.stdout"

- name: Validate configuration
  ansible.builtin.command:
    cmd: '{{ pilot_current_link }}/bin/pilot setup validate'
  become_user: '{{ pilot_user }}'
  changed_when: false
  failed_when: false
  register: pilot_validate

- name: Deploy systemd unit
  ansible.builtin.template:
    src: pilot.service.j2
    dest: /etc/systemd/system/pilot.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart pilot

- name: Enable and start pilot service
  ansible.builtin.systemd:
    name: pilot
    enabled: true
    state: started
    daemon_reload: true

- name: List existing releases
  ansible.builtin.find:
    paths: '{{ pilot_releases_dir }}'
    file_type: directory
  register: pilot_existing_releases

- name: Clean up old releases
  ansible.builtin.file:
    path: '{{ item.path }}'
    state: absent
  loop: "{{ (pilot_existing_releases.files | sort(attribute='mtime') | reverse)[pilot_keep_releases:] }}"
  when: pilot_existing_releases.files | length > pilot_keep_releases

---
- name: Ensure npm-global directory exists
  ansible.builtin.file:
    path: '{{ googleworkspace_cli_home }}/.npm-global'
    state: directory
    owner: '{{ googleworkspace_cli_user }}'
    group: '{{ googleworkspace_cli_group }}'
    mode: '0755'

- name: Configure npm global prefix for ubuntu
  ansible.builtin.command:
    cmd: npm config set prefix {{ googleworkspace_cli_home }}/.npm-global
  become: true
  become_user: '{{ googleworkspace_cli_user }}'
  changed_when: false

- name: Install @googleworkspace/cli globally for ubuntu
  community.general.npm:
    name: '@googleworkspace/cli'
    global: true
    state: present
  become: true
  become_user: '{{ googleworkspace_cli_user }}'
  environment:
    npm_config_prefix: '{{ googleworkspace_cli_home }}/.npm-global'

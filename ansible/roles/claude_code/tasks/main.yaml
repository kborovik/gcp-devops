---
- name: Check if Claude Code is installed
  ansible.builtin.stat:
    path: '{{ claude_code_home }}/.local/bin/claude'
  register: claude_code_check

- name: Install Claude Code
  when: not claude_code_check.stat.exists
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://claude.ai/install.sh | bash
    executable: /bin/bash
    creates: '{{ claude_code_home }}/.local/bin/claude'
  become: true
  become_user: '{{ claude_code_user }}'

- name: Add Claude Code to system PATH
  ansible.builtin.file:
    src: '{{ claude_code_home }}/.local/bin/claude'
    dest: /usr/local/bin/claude
    state: link
    force: true

- name: Verify Claude Code installation
  ansible.builtin.command:
    cmd: claude --version
  become: true
  become_user: '{{ claude_code_user }}'
  register: claude_code_version
  changed_when: false

- name: Display Claude Code version
  ansible.builtin.debug:
    msg: 'Claude Code version: {{ claude_code_version.stdout }}'

- name: Create Claude Code commands directory
  ansible.builtin.file:
    path: '{{ claude_code_home }}/.claude/commands'
    state: directory
    owner: '{{ claude_code_user }}'
    group: '{{ claude_code_group }}'
    mode: '0755'

- name: Deploy Claude Code commands
  ansible.builtin.copy:
    src: 'commands/'
    dest: '{{ claude_code_home }}/.claude/commands/'
    owner: '{{ claude_code_user }}'
    group: '{{ claude_code_group }}'
    mode: '0644'

- name: Create Claude Code skills directory
  ansible.builtin.file:
    path: '{{ claude_code_home }}/.claude/skills'
    state: directory
    owner: '{{ claude_code_user }}'
    group: '{{ claude_code_group }}'
    mode: '0755'

- name: Deploy Claude Code skills
  ansible.builtin.copy:
    src: 'skills/'
    dest: '{{ claude_code_home }}/.claude/skills/'
    owner: '{{ claude_code_user }}'
    group: '{{ claude_code_group }}'
    mode: '0644'

---
- name: Install or update Claude Code
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://claude.ai/install.sh | bash
    executable: /bin/bash
  become: true
  become_user: '{{ claude_code_user }}'
  register: claude_code_install
  changed_when: "'Installing' in claude_code_install.stdout or 'Updating' in claude_code_install.stdout"

- name: Add Claude Code to system PATH
  ansible.builtin.file:
    src: '{{ claude_code_home }}/.local/bin/claude'
    dest: /usr/local/bin/claude
    state: link
    force: true

- name: Verify Claude Code installation
  ansible.builtin.command:
    cmd: claude --version
  become: true
  become_user: '{{ claude_code_user }}'
  register: claude_code_version
  changed_when: false

- name: Display Claude Code version
  ansible.builtin.debug:
    msg: 'Claude Code version: {{ claude_code_version.stdout }}'

- name: Render LOGFIRE_TOKEN into fish init
  ansible.builtin.template:
    src: logfire.fish.j2
    dest: '{{ claude_code_home }}/.config/fish/conf.d/logfire.fish'
    owner: '{{ claude_code_user }}'
    group: '{{ claude_code_group }}'
    mode: '0600'

- name: Load Claude Code settings declaration
  ansible.builtin.set_fact:
    claude_settings: "{{ lookup('file', 'settings.json') | from_json }}"

- name: Register Claude plugin marketplaces
  ansible.builtin.command:
    cmd: claude plugin marketplace add {{ item.value.source.repo }}
  become: true
  become_user: '{{ claude_code_user }}'
  loop: '{{ claude_settings.extraKnownMarketplaces | dict2items }}'
  loop_control:
    label: '{{ item.key }}'
  register: claude_marketplace_add
  changed_when: "'added' in claude_marketplace_add.stdout | lower"
  failed_when:
    - claude_marketplace_add.rc != 0
    - "'already' not in (claude_marketplace_add.stderr | default('') | lower)"

- name: Install Claude plugins
  ansible.builtin.command:
    cmd: claude plugin install {{ item.key }}
  become: true
  become_user: '{{ claude_code_user }}'
  loop: "{{ claude_settings.enabledPlugins | dict2items | selectattr('value', 'equalto', true) | list }}"
  loop_control:
    label: '{{ item.key }}'
  register: claude_plugin_install
  changed_when: "'installed' in claude_plugin_install.stdout | lower"
  failed_when:
    - claude_plugin_install.rc != 0
    - "'already' not in (claude_plugin_install.stderr | default('') | lower)"

- name: Ensure ~/.claude directory exists
  ansible.builtin.file:
    path: '{{ claude_code_home }}/.claude'
    state: directory
    owner: '{{ claude_code_user }}'
    group: '{{ claude_code_group }}'
    mode: '0755'

- name: Deploy Claude Code settings.json (only if missing)
  ansible.builtin.copy:
    src: settings.json
    dest: '{{ claude_code_home }}/.claude/settings.json'
    owner: '{{ claude_code_user }}'
    group: '{{ claude_code_group }}'
    mode: '0644'
    force: false

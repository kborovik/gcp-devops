---
- name: Assert mailpilot_version is set
  ansible.builtin.assert:
    that:
      - mailpilot_version | length > 0
    fail_msg: "mailpilot_version must be set (e.g. --extra-vars 'mailpilot_version=0.1.0')"

- name: Install mailpilot v{{ mailpilot_version }} from GitHub
  ansible.builtin.command:
    cmd: >-
      {{ mailpilot_home }}/.local/bin/uv tool install
      --python {{ uv_python_version }}
      --upgrade
      git+https://x-access-token:{{ mailpilot_github_token }}@github.com/kborovik/mailpilot@v{{ mailpilot_version }}
  become: true
  become_user: '{{ mailpilot_user }}'
  register: mailpilot_install
  changed_when: "'Installed' in mailpilot_install.stdout or 'Updated' in mailpilot_install.stdout"

- name: Verify mailpilot installation
  ansible.builtin.command:
    cmd: '{{ mailpilot_home }}/.local/bin/mailpilot --version'
  become: true
  become_user: '{{ mailpilot_user }}'
  register: mailpilot_version_check
  changed_when: false

- name: Display mailpilot version
  ansible.builtin.debug:
    msg: 'mailpilot version: {{ mailpilot_version_check.stdout }}'

- name: Add mailpilot to system PATH
  ansible.builtin.file:
    src: '{{ mailpilot_home }}/.local/bin/mailpilot'
    dest: /usr/local/bin/mailpilot
    state: link
    force: true

- name: Ensure PostgreSQL cluster is started
  ansible.builtin.command:
    cmd: /usr/bin/pg_ctlcluster 18 main start
  register: pg_start
  changed_when: pg_start.rc == 0 and 'already running' not in (pg_start.stderr | default(''))
  failed_when: pg_start.rc != 0 and 'already running' not in (pg_start.stderr | default(''))

- name: Check if ubuntu PostgreSQL role exists
  ansible.builtin.command:
    cmd: psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='ubuntu'" postgres
  become: true
  become_user: postgres
  register: ubuntu_pg_role_check
  changed_when: false

- name: Create ubuntu PostgreSQL role if missing
  ansible.builtin.command:
    cmd: psql -c "CREATE ROLE ubuntu WITH LOGIN CREATEDB"
  become: true
  become_user: postgres
  when: ubuntu_pg_role_check.stdout != '1'

- name: Check if mailpilot database exists
  ansible.builtin.command:
    cmd: psql -tAc "SELECT 1 FROM pg_database WHERE datname='mailpilot'" postgres
  become: true
  become_user: postgres
  register: mailpilot_pg_db_check
  changed_when: false

- name: Create mailpilot database if missing
  ansible.builtin.command:
    cmd: createdb -O ubuntu mailpilot
  become: true
  become_user: postgres
  when: mailpilot_pg_db_check.stdout != '1'

- name: Check public schema owner in mailpilot database
  ansible.builtin.command:
    cmd: psql -tAc "SELECT nspowner::regrole FROM pg_namespace WHERE nspname='public'" mailpilot
  become: true
  become_user: postgres
  register: public_schema_owner
  changed_when: false

- name: Grant ubuntu ownership of public schema in mailpilot database
  ansible.builtin.command:
    cmd: psql -d mailpilot -c "ALTER SCHEMA public OWNER TO ubuntu"
  become: true
  become_user: postgres
  when: public_schema_owner.stdout != 'ubuntu'

- name: Initialize database schema
  ansible.builtin.command:
    cmd: '{{ mailpilot_home }}/.local/bin/mailpilot status'
  become: true
  become_user: '{{ mailpilot_user }}'
  changed_when: false

- name: Ensure mailpilot config directory
  ansible.builtin.file:
    path: '{{ mailpilot_home }}/.mailpilot'
    state: directory
    owner: '{{ mailpilot_user }}'
    group: '{{ mailpilot_group }}'
    mode: '0700'

- name: Render mailpilot config.json
  ansible.builtin.template:
    src: config.json.j2
    dest: '{{ mailpilot_home }}/.mailpilot/config.json'
    owner: '{{ mailpilot_user }}'
    group: '{{ mailpilot_group }}'
    mode: '0600'
  notify: Restart mailpilot

- name: Install mailpilot google service-account credentials
  ansible.builtin.copy:
    src: '{{ mailpilot_google_credentials_path }}'
    dest: '{{ mailpilot_home }}/.mailpilot/google-credentials.json'
    owner: '{{ mailpilot_user }}'
    group: '{{ mailpilot_group }}'
    mode: '0600'
  notify: Restart mailpilot

- name: Install mailpilot systemd unit
  ansible.builtin.template:
    src: mailpilot.service.j2
    dest: /etc/systemd/system/mailpilot.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart mailpilot

- name: Enable and start mailpilot service
  ansible.builtin.systemd:
    name: mailpilot.service
    state: started
    enabled: true
    daemon_reload: true

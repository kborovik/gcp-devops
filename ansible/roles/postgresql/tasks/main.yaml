---
- name: Import PostgreSQL GPG Key
  ansible.builtin.apt_key:
    id: B97B0AFCAA1A47F044F244A07FCC7D46ACCC4CF8
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    keyring: /etc/apt/trusted.gpg.d/postgresql.gpg
    state: present

- name: Add PostgreSQL Apt Repository
  ansible.builtin.apt_repository:
    filename: postgresql
    repo: deb [arch=amd64] https://apt.postgresql.org/pub/repos/apt noble-pgdg main
    state: present

- name: Install PostgreSQL 18 and pgBackRest
  ansible.builtin.apt:
    package: ["postgresql-18", "pgbackrest"]
    update_cache: true
    state: present

- name: Check if PostgreSQL data directory is initialized
  ansible.builtin.stat:
    path: /var/lib/postgresql/18/main/PG_VERSION
  register: pg_data_check

- name: Check if PostgreSQL config exists
  ansible.builtin.stat:
    path: /etc/postgresql/18/main/postgresql.conf
  register: pg_conf_check

- name: Initialize PostgreSQL data directory
  when: not pg_data_check.stat.exists or not pg_conf_check.stat.exists
  block:
    - name: Drop default PostgreSQL cluster
      ansible.builtin.command:
        cmd: pg_dropcluster --stop 18 main
      register: pg_drop_default
      changed_when: pg_drop_default.rc == 0
      failed_when: false

    - name: Clean ZFS data directory
      ansible.builtin.command:
        cmd: find /var/lib/postgresql/18/main -mindepth 1 -maxdepth 1 -exec rm -rf {} +
      register: pg_clean_data
      changed_when: pg_clean_data.rc == 0

    - name: Clean ZFS WAL directory
      ansible.builtin.command:
        cmd: find /var/lib/postgresql/18/wal -mindepth 1 -maxdepth 1 -exec rm -rf {} +
      register: pg_clean_wal
      changed_when: pg_clean_wal.rc == 0

    - name: Set ZFS PostgreSQL data directory ownership
      ansible.builtin.file:
        path: /var/lib/postgresql/18/main
        owner: postgres
        group: postgres
        mode: "0700"
        state: directory

    - name: Set ZFS PostgreSQL WAL directory ownership
      ansible.builtin.file:
        path: /var/lib/postgresql/18/wal
        owner: postgres
        group: postgres
        mode: "0700"
        state: directory

    - name: Create PostgreSQL cluster on ZFS
      ansible.builtin.command:
        cmd: >-
          pg_createcluster 18 main
          --datadir=/var/lib/postgresql/18/main
          -- --waldir=/var/lib/postgresql/18/wal
      register: pg_createcluster
      changed_when: pg_createcluster.rc == 0

- name: Configure full_page_writes
  ansible.builtin.lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?full_page_writes\\s*="
    line: "full_page_writes = on"
  notify: Restart PostgreSQL

- name: Configure wal_init_zero
  ansible.builtin.lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?wal_init_zero\\s*="
    line: "wal_init_zero = off"
  notify: Restart PostgreSQL

- name: Configure shared_buffers
  ansible.builtin.lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?shared_buffers\\s*="
    line: "shared_buffers = 512MB"
  notify: Restart PostgreSQL

- name: Configure huge_pages
  ansible.builtin.lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?huge_pages\\s*="
    line: "huge_pages = off"
  notify: Restart PostgreSQL

- name: Configure wal_level
  ansible.builtin.lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?wal_level\\s*="
    line: "wal_level = replica"
  notify: Restart PostgreSQL

- name: Configure archive_mode
  ansible.builtin.lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?archive_mode\\s*="
    line: "archive_mode = on"
  notify: Restart PostgreSQL

- name: Configure archive_command
  ansible.builtin.lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?archive_command\\s*="
    line: "archive_command = 'pgbackrest --stanza=main archive-push %p'"
  notify: Restart PostgreSQL

- name: Fetch GCP project ID from metadata server
  ansible.builtin.uri:
    url: http://metadata.google.internal/computeMetadata/v1/project/project-id
    headers:
      Metadata-Flavor: Google
    return_content: true
  register: gcp_metadata

- name: Set GCP project ID fact
  ansible.builtin.set_fact:
    gcp_project_id: "{{ gcp_metadata.content }}"

- name: Create pgBackRest configuration directory
  ansible.builtin.file:
    path: /etc/pgbackrest
    owner: postgres
    group: postgres
    mode: "0750"
    state: directory

- name: Deploy pgBackRest configuration
  ansible.builtin.template:
    src: pgbackrest.conf.j2
    dest: /etc/pgbackrest/pgbackrest.conf
    owner: postgres
    group: postgres
    mode: "0640"

- name: Start PostgreSQL
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true

- name: Check if pgBackRest stanza exists
  ansible.builtin.command:
    cmd: pgbackrest --stanza=main info
  become: true
  become_user: postgres
  register: pgbackrest_info
  changed_when: false
  failed_when: false

- name: Create pgBackRest stanza
  ansible.builtin.command:
    cmd: pgbackrest --stanza=main stanza-create
  become: true
  become_user: postgres
  when: pgbackrest_info.rc != 0

- name: Deploy pgBackRest diff backup service
  ansible.builtin.template:
    src: pgbackrest-backup.service.j2
    dest: /etc/systemd/system/pgbackrest-backup.service
    owner: root
    group: root
    mode: "0644"

- name: Deploy pgBackRest diff backup timer
  ansible.builtin.template:
    src: pgbackrest-backup.timer.j2
    dest: /etc/systemd/system/pgbackrest-backup.timer
    owner: root
    group: root
    mode: "0644"

- name: Deploy pgBackRest full backup service
  ansible.builtin.template:
    src: pgbackrest-full.service.j2
    dest: /etc/systemd/system/pgbackrest-full.service
    owner: root
    group: root
    mode: "0644"

- name: Deploy pgBackRest full backup timer
  ansible.builtin.template:
    src: pgbackrest-full.timer.j2
    dest: /etc/systemd/system/pgbackrest-full.timer
    owner: root
    group: root
    mode: "0644"

- name: Enable pgBackRest diff backup timer
  ansible.builtin.systemd:
    name: pgbackrest-backup.timer
    enabled: true
    state: started
    daemon_reload: true

- name: Enable pgBackRest full backup timer
  ansible.builtin.systemd:
    name: pgbackrest-full.timer
    enabled: true
    state: started

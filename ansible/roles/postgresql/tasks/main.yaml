---
- name: Import PostgreSQL GPG Key
  ansible.builtin.apt_key:
    id: B97B0AFCAA1A47F044F244A07FCC7D46ACCC4CF8
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    keyring: /etc/apt/trusted.gpg.d/postgresql.gpg
    state: present

- name: Add PostgreSQL Apt Repository
  ansible.builtin.apt_repository:
    filename: postgresql
    repo: deb [arch=amd64] https://apt.postgresql.org/pub/repos/apt noble-pgdg main
    state: present

- name: Install PostgreSQL 18
  ansible.builtin.apt:
    package: ["postgresql-18"]
    update_cache: true
    state: present

- name: Check if PostgreSQL data directory is initialized
  ansible.builtin.stat:
    path: /var/lib/postgresql/18/main/PG_VERSION
  register: pg_data_check

- name: Check if PostgreSQL config exists
  ansible.builtin.stat:
    path: /etc/postgresql/18/main/postgresql.conf
  register: pg_conf_check

- name: Initialize PostgreSQL data directory
  when: not pg_data_check.stat.exists or not pg_conf_check.stat.exists
  block:
    - name: Drop default PostgreSQL cluster
      ansible.builtin.command:
        cmd: pg_dropcluster --stop 18 main
      register: pg_drop_default
      changed_when: pg_drop_default.rc == 0
      failed_when: false

    - name: Clean ZFS data directory
      ansible.builtin.command:
        cmd: find /var/lib/postgresql/18/main -mindepth 1 -maxdepth 1 -exec rm -rf {} +
      register: pg_clean_data
      changed_when: pg_clean_data.rc == 0

    - name: Set ZFS PostgreSQL data directory ownership
      ansible.builtin.file:
        path: /var/lib/postgresql/18/main
        owner: postgres
        group: postgres
        mode: "0700"
        state: directory

    - name: Create PostgreSQL cluster on ZFS
      ansible.builtin.command:
        cmd: >-
          pg_createcluster 18 main
          --datadir=/var/lib/postgresql/18/main
      register: pg_createcluster
      changed_when: pg_createcluster.rc == 0

- name: Configure full_page_writes
  ansible.builtin.lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?full_page_writes\\s*="
    line: "full_page_writes = on"
  notify: Restart PostgreSQL

- name: Configure shared_buffers
  ansible.builtin.lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?shared_buffers\\s*="
    line: "shared_buffers = 512MB"
  notify: Restart PostgreSQL

- name: Configure huge_pages
  ansible.builtin.lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?huge_pages\\s*="
    line: "huge_pages = off"
  notify: Restart PostgreSQL

- name: Configure wal_level
  ansible.builtin.lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?wal_level\\s*="
    line: "wal_level = minimal"
  notify: Restart PostgreSQL

- name: Configure max_wal_senders
  ansible.builtin.lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?max_wal_senders\\s*="
    line: "max_wal_senders = 0"
  notify: Restart PostgreSQL

- name: Start PostgreSQL
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true

# Cleanup: remove pgBackRest from existing systems
- name: Stop and disable pgBackRest timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
    daemon_reload: false
  loop:
    - pgbackrest-backup.timer
    - pgbackrest-full.timer
  failed_when: false

- name: Remove pgBackRest systemd units
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item }}"
    state: absent
  loop:
    - pgbackrest-backup.service
    - pgbackrest-backup.timer
    - pgbackrest-full.service
    - pgbackrest-full.timer
  notify: Reload systemd

- name: Remove pgBackRest configuration directory
  ansible.builtin.file:
    path: /etc/pgbackrest
    state: absent

- name: Remove pgbackrest package
  ansible.builtin.apt:
    package: ["pgbackrest"]
    state: absent

- name: Remove archive_mode from postgresql.conf
  ansible.builtin.lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^archive_mode\\s*="
    state: absent
  notify: Restart PostgreSQL

- name: Remove archive_command from postgresql.conf
  ansible.builtin.lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^archive_command\\s*="
    state: absent
  notify: Restart PostgreSQL

- name: Remove wal_init_zero from postgresql.conf
  ansible.builtin.lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^wal_init_zero\\s*="
    state: absent
  notify: Restart PostgreSQL

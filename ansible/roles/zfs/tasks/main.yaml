---
- name: Install ZFS Utils
  ansible.builtin.apt:
    package: ["zfsutils-linux"]
    state: present

- name: Check zpool status
  ansible.builtin.command:
    cmd: zpool status -x data
  register: zpool_status
  changed_when: false
  failed_when: false

- name: Create zpool
  when: zpool_status.rc != 0
  ansible.builtin.command:
    cmd: zpool create -m none data /dev/sdb
  register: zpool_create
  changed_when: zpool_create.rc == 0
  failed_when: zpool_create.rc != 0

- name: Set default ZFS properties
  ansible.builtin.command:
    cmd: zfs set compression=zstd data
  register: zfs_properties
  changed_when: zfs_properties.rc == 0

- name: Disable atime on pool
  ansible.builtin.command:
    cmd: zfs set atime=off data
  register: zfs_atime
  changed_when: zfs_atime.rc == 0

- name: Check ZFS PostgreSQL parent dataset
  ansible.builtin.command:
    cmd: zfs list -H data/postgresql
  register: zfs_pg_parent_status
  changed_when: false
  failed_when: false

- name: Create ZFS PostgreSQL parent dataset
  when: zfs_pg_parent_status.rc != 0
  ansible.builtin.command:
    cmd: zfs create -o mountpoint=none data/postgresql
  register: zfs_pg_parent_create
  changed_when: zfs_pg_parent_create.rc == 0
  failed_when: zfs_pg_parent_create.rc != 0

- name: Check ZFS PostgreSQL data dataset
  ansible.builtin.command:
    cmd: zfs list -H data/postgresql/data
  register: zfs_pg_data_status
  changed_when: false
  failed_when: false

- name: Create ZFS PostgreSQL data dataset
  when: zfs_pg_data_status.rc != 0
  ansible.builtin.command:
    cmd: >-
      zfs create
      -o mountpoint=/var/lib/postgresql/18/main
      -o recordsize=8K
      -o primarycache=metadata
      -o logbias=latency
      data/postgresql/data
  register: zfs_pg_data_create
  changed_when: zfs_pg_data_create.rc == 0
  failed_when: zfs_pg_data_create.rc != 0

- name: Check ZFS PostgreSQL WAL dataset
  ansible.builtin.command:
    cmd: zfs list -H data/postgresql/wal
  register: zfs_pg_wal_status
  changed_when: false
  failed_when: false

- name: Create ZFS PostgreSQL WAL dataset
  when: zfs_pg_wal_status.rc != 0
  ansible.builtin.command:
    cmd: >-
      zfs create
      -o mountpoint=/var/lib/postgresql/18/wal
      -o recordsize=128K
      -o logbias=throughput
      data/postgresql/wal
  register: zfs_pg_wal_create
  changed_when: zfs_pg_wal_create.rc == 0
  failed_when: zfs_pg_wal_create.rc != 0

- name: Check ZFS PostgreSQL WAL mountpoint
  when: zfs_pg_wal_status.rc == 0
  ansible.builtin.command:
    cmd: zfs get -H -o value mountpoint data/postgresql/wal
  register: zfs_pg_wal_mountpoint
  changed_when: false

- name: Update ZFS PostgreSQL WAL mountpoint
  when:
    - zfs_pg_wal_status.rc == 0
    - zfs_pg_wal_mountpoint.stdout != '/var/lib/postgresql/18/wal'
  block:
    - name: Stop PostgreSQL for WAL mountpoint migration
      ansible.builtin.service:
        name: postgresql
        state: stopped

    - name: Set ZFS PostgreSQL WAL mountpoint
      ansible.builtin.command:
        cmd: zfs set mountpoint=/var/lib/postgresql/18/wal data/postgresql/wal
      register: zfs_pg_wal_mountpoint_set
      changed_when: zfs_pg_wal_mountpoint_set.rc == 0

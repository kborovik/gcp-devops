- name: Install ZFS Utils
  ansible.builtin.apt:
    package: ["zfsutils-linux"]
    state: present

- name: Check zpool status
  ansible.builtin.command:
    cmd: zpool status -x data
  register: zpool_status
  changed_when: false
  failed_when: false

- name: Create zpool
  when: zpool_status.rc != 0
  ansible.builtin.command:
    cmd: zpool create -m none data /dev/sdb
  register: zpool_create
  changed_when: zpool_create.rc == 0
  failed_when: zpool_create.rc != 0

- name: Set default ZFS properties
  ansible.builtin.command:
    cmd: zfs set compression=zstd data
  register: zfs_properties
  changed_when: zfs_properties.rc != 0

- name: Check ZFS Data status
  ansible.builtin.command:
    cmd: zfs list -H data/docker-volumes
  register: zfs_status
  changed_when: false
  failed_when: false

- name: Create ZFS Data filesystem
  when: zfs_status.rc != 0
  ansible.builtin.command:
    cmd: zfs create -o mountpoint=/var/lib/docker/volumes data/docker-volumes
  register: zfs_create
  changed_when: zfs_create.rc == 0
  failed_when: zfs_create.rc != 0

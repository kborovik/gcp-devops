---
- name: Install ZFS Utils
  ansible.builtin.apt:
    package: ["zfsutils-linux"]
    state: present

- name: Check zpool status
  ansible.builtin.command:
    cmd: zpool status -x data
  register: zpool_status
  changed_when: false
  failed_when: false

- name: Import existing zpool
  when: zpool_status.rc != 0
  ansible.builtin.command:
    cmd: zpool import -f data
  register: zpool_import
  changed_when: zpool_import.rc == 0
  failed_when: false

- name: Create zpool
  when:
    - zpool_status.rc != 0
    - zpool_import.rc != 0
  ansible.builtin.command:
    cmd: zpool create -m none data /dev/sdb
  register: zpool_create
  changed_when: zpool_create.rc == 0
  failed_when: zpool_create.rc != 0

- name: Set default ZFS properties
  ansible.builtin.command:
    cmd: zfs set compression=zstd data
  register: zfs_properties
  changed_when: zfs_properties.rc == 0

- name: Disable atime on pool
  ansible.builtin.command:
    cmd: zfs set atime=off data
  register: zfs_atime
  changed_when: zfs_atime.rc == 0

- name: Check ZFS PostgreSQL parent dataset
  ansible.builtin.command:
    cmd: zfs list -H data/postgresql
  register: zfs_pg_parent_status
  changed_when: false
  failed_when: false

- name: Create ZFS PostgreSQL parent dataset
  when: zfs_pg_parent_status.rc != 0
  ansible.builtin.command:
    cmd: zfs create -o mountpoint=none data/postgresql
  register: zfs_pg_parent_create
  changed_when: zfs_pg_parent_create.rc == 0
  failed_when: zfs_pg_parent_create.rc != 0

- name: Check ZFS PostgreSQL data dataset
  ansible.builtin.command:
    cmd: zfs list -H data/postgresql/data
  register: zfs_pg_data_status
  changed_when: false
  failed_when: false

- name: Create ZFS PostgreSQL data dataset
  when: zfs_pg_data_status.rc != 0
  ansible.builtin.command:
    cmd: >-
      zfs create
      -o mountpoint=/var/lib/postgresql/18/main
      -o recordsize=8K
      -o primarycache=metadata
      -o logbias=latency
      data/postgresql/data
  register: zfs_pg_data_create
  changed_when: zfs_pg_data_create.rc == 0
  failed_when: zfs_pg_data_create.rc != 0

- name: Check ZFS PostgreSQL WAL dataset
  ansible.builtin.command:
    cmd: zfs list -H data/postgresql/wal
  register: zfs_pg_wal_status
  changed_when: false
  failed_when: false

- name: Create ZFS PostgreSQL WAL dataset
  when: zfs_pg_wal_status.rc != 0
  ansible.builtin.command:
    cmd: >-
      zfs create
      -o mountpoint=/var/lib/postgresql/18/wal
      -o recordsize=128K
      -o logbias=throughput
      data/postgresql/wal
  register: zfs_pg_wal_create
  changed_when: zfs_pg_wal_create.rc == 0
  failed_when: zfs_pg_wal_create.rc != 0

- name: Check ZFS home dataset
  ansible.builtin.command:
    cmd: zfs list -H data/home
  register: zfs_home_status
  changed_when: false
  failed_when: false

- name: Check old ZFS pilot dataset
  when: zfs_home_status.rc != 0
  ansible.builtin.command:
    cmd: zfs list -H data/pilot
  register: zfs_pilot_status
  changed_when: false
  failed_when: false

- name: Migrate data/pilot to data/home
  when:
    - zfs_home_status.rc != 0
    - zfs_pilot_status.rc == 0
  block:
    - name: Backup home directory before migration
      ansible.builtin.command:
        cmd: cp -a /home/ubuntu /tmp/ubuntu-home-backup
      changed_when: true

    - name: Unmount old pilot dataset
      ansible.builtin.command:
        cmd: zfs unmount data/pilot
      changed_when: true
      failed_when: false

    - name: Rename data/pilot to data/home
      ansible.builtin.command:
        cmd: zfs rename data/pilot data/home
      changed_when: true

    - name: Set data/home mountpoint to /home/ubuntu
      ansible.builtin.command:
        cmd: zfs set mountpoint=/home/ubuntu data/home
      changed_when: true

    - name: Mount data/home
      ansible.builtin.command:
        cmd: zfs mount data/home
      register: zfs_mount_home
      changed_when: zfs_mount_home.rc == 0
      failed_when:
        - zfs_mount_home.rc != 0
        - "'filesystem already mounted' not in zfs_mount_home.stderr"

    - name: Restore home directory contents
      ansible.builtin.shell:
        cmd: cp -an /tmp/ubuntu-home-backup/. /home/ubuntu/
      changed_when: true

    - name: Clean up home backup
      ansible.builtin.file:
        path: /tmp/ubuntu-home-backup
        state: absent

- name: Create ZFS home dataset
  when:
    - zfs_home_status.rc != 0
    - zfs_pilot_status is not defined or zfs_pilot_status is skipped or zfs_pilot_status.rc != 0
  block:
    - name: Backup home directory before ZFS creation
      ansible.builtin.command:
        cmd: cp -a /home/ubuntu /tmp/ubuntu-home-backup
      changed_when: true

    - name: Create data/home dataset
      ansible.builtin.command:
        cmd: >-
          zfs create
          -o mountpoint=/home/ubuntu
          data/home
      register: zfs_home_create
      changed_when: zfs_home_create.rc == 0
      failed_when: zfs_home_create.rc != 0

    - name: Restore home directory contents
      ansible.builtin.shell:
        cmd: cp -an /tmp/ubuntu-home-backup/. /home/ubuntu/
      changed_when: true

    - name: Clean up home backup
      ansible.builtin.file:
        path: /tmp/ubuntu-home-backup
        state: absent

- name: Set ZFS home dataset ownership
  ansible.builtin.file:
    path: /home/ubuntu
    owner: ubuntu
    group: ubuntu
    state: directory

- name: Check ZFS PostgreSQL WAL mountpoint
  when: zfs_pg_wal_status.rc == 0
  ansible.builtin.command:
    cmd: zfs get -H -o value mountpoint data/postgresql/wal
  register: zfs_pg_wal_mountpoint
  changed_when: false

- name: Update ZFS PostgreSQL WAL mountpoint
  when:
    - zfs_pg_wal_status.rc == 0
    - zfs_pg_wal_mountpoint.stdout != '/var/lib/postgresql/18/wal'
  block:
    - name: Stop PostgreSQL for WAL mountpoint migration
      ansible.builtin.service:
        name: postgresql
        state: stopped

    - name: Set ZFS PostgreSQL WAL mountpoint
      ansible.builtin.command:
        cmd: zfs set mountpoint=/var/lib/postgresql/18/wal data/postgresql/wal
      register: zfs_pg_wal_mountpoint_set
      changed_when: zfs_pg_wal_mountpoint_set.rc == 0

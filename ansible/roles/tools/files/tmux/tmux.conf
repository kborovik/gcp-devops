# tmux baseline for Ubuntu GCE hosts running Claude Code over iTerm2 → SSH.
# Managed by ansible/roles/tools — host-side edits will be overwritten.

# True color — iTerm2 supports RGB; Claude Code diffs & syntax need it
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*256col*:RGB"

# Focus events — nvim FocusGained/Lost, Claude IDE integrations
set -g focus-events on

# Mouse — scroll Claude's long tool output without entering copy mode.
# Hold Option (macOS) while selecting to bypass tmux and use iTerm2's native copy.
set -g mouse on

# Scrollback — default 2000 is too small for Claude Read tool dumps.
# ~10-50 MB RAM per pane.
set -g history-limit 100000

# Escape latency — 50ms is the SSH-safe value (10ms can clip multi-byte
# sequences over flaky links; 500ms default makes Esc-to-interrupt laggy).
set -sg escape-time 50

# Clipboard — OSC 52 push through tmux → iTerm2 → macOS pasteboard.
# iTerm2: Preferences → General → Selection → "Applications in terminal may access clipboard"
set -g set-clipboard on

# Re-layout on detach/reattach from different-sized client
setw -g aggressive-resize on

# Pane border shows which pane Claude is running in
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_current_command} "

# Let TUIs (Claude Code, nvim) set the iTerm2 tab title
set -g set-titles on
set -g set-titles-string "#T"

# Do NOT remap C-c / C-d — Claude Code uses them to interrupt agent / exit session.
# Do NOT enable `remain-on-exit` globally — leaves zombie panes when /exit.
# Keep default `C-b` prefix — `C-a` collides with readline beginning-of-line
# in Claude Code's input box.

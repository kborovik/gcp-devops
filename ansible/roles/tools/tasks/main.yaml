---
- name: Install OS Tools
  ansible.builtin.apt:
    package: ['acl', 'bat', 'fish', 'git', 'jq', 'make', 'gnupg', 'tree']
    update_cache: true
    state: present

- name: Copy Fish config
  ansible.builtin.copy:
    src: fish/
    dest: /home/ubuntu/.config/fish/
    owner: ubuntu
    group: ubuntu

- name: Copy VIM config
  ansible.builtin.copy:
    src: vim/
    dest: /home/ubuntu/.vim/
    owner: ubuntu
    group: ubuntu

- name: Set vm.swappiness to 1
  ansible.posix.sysctl:
    name: vm.swappiness
    value: '1'
    sysctl_set: true
    state: present
    reload: true

- name: Set Fish as default shell
  ansible.builtin.user:
    name: ubuntu
    shell: /usr/bin/fish

---
- name: Install OS Tools
  ansible.builtin.apt:
    package: ["fish", "git", "jq", "make", "unattended-upgrades"]
    update_cache: true
    state: present

- name: Enable General Updates
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    regexp: 'distro_codename.-updates";$'
    line: '        "${distro_id}:${distro_codename}-updates";'

- name: Enable Docker Terraform Updates
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    regexp: 'distro_codename.-proposed";$'
    line: '        "Docker:noble"; "Artifactory:noble"; "cloud-sdk:cloud-sdk";'

- name: Enable Automatic Reboot
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    search_string: '//Unattended-Upgrade::Automatic-Reboot "false";'
    line: 'Unattended-Upgrade::Automatic-Reboot "true";'

- name: Set Automatic Reboot Time
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    search_string: '//Unattended-Upgrade::Automatic-Reboot-Time "02:00";'
    line: 'Unattended-Upgrade::Automatic-Reboot-Time "02:00";'

- name: Force Automatic Reboot
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    search_string: '//Unattended-Upgrade::Automatic-Reboot-WithUsers "true";'
    line: 'Unattended-Upgrade::Automatic-Reboot-WithUsers "true";'

- name: Remove Unused Dependencies
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    search_string: '//Unattended-Upgrade::Remove-Unused-Dependencies "false";'
    line: 'Unattended-Upgrade::Remove-Unused-Dependencies "true";'
